<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --black: #080808; --gold: #C17A2A; --gold-light: #E8A84A; --cream: #f0ece4; --muted: #555; --border: #1e1e1e; }
  body { background: var(--black); color: var(--cream); font-family: 'Inter', sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
  .tag { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 1.5rem; }
  .code { font-family: 'Bebas Neue', sans-serif; font-size: clamp(96px, 18vw, 220px); line-height: 0.9; letter-spacing: 6px; color: var(--cream); margin-bottom: 1rem; }
  .title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(28px, 4vw, 44px); letter-spacing: 3px; margin-bottom: 1.5rem; }
  .quote { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: clamp(16px, 2vw, 22px); color: #aaa; max-width: 480px; line-height: 1.6; padding-left: 1.5rem; border-left: 1px solid var(--gold); margin: 0 auto 3rem; text-align: left; }
  .cta { display: inline-block; padding: 1rem 2.5rem; border: 1px solid var(--gold); color: var(--gold); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; text-decoration: none; transition: background 0.3s, color 0.3s; }
  .cta:hover { background: linear-gradient(135deg, #8B5210, #C17A2A, #E8A84A, #C17A2A); color: var(--black); }
  .deco { width: 60px; height: 1px; background: var(--gold); opacity: 0.4; margin: 2rem auto; }
</style>
